<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Avanna Hotel</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="admin-body">

  <div class="admin-login-wrap">
    <div class="admin-login-card">
      <div style="text-align:center; margin-bottom:32px;">
        <img src="../images/avanna_logo.png" alt="Avanna Hotel" style="height:64px; width:auto;" />
        <div style="font-size:0.7rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold); margin-top:8px;">Admin Portal</div>
      </div>

      <h2>Sign In</h2>
      <p class="sub">Enter your admin password to continue.</p>

      <div id="loginAlert"></div>

      <form id="loginForm" class="admin-form" novalidate>
        <div class="form-group" style="text-align:left;">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required autofocus />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;" id="loginBtn">
          Sign In
        </button>
      </form>
    </div>
  </div>

  <script>
    if (sessionStorage.getItem('admin_auth') === 'true') {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn      = document.getElementById('loginBtn');
      const alertEl  = document.getElementById('loginAlert');
      const password = document.getElementById('password').value;

      btn.disabled    = true;
      btn.textContent = 'Signing in…';
      alertEl.innerHTML = '';

      try {
        const res  = await fetch('../api/config.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'auth', password }),
        });
        const data = await res.json();

        if (data.success) {
          sessionStorage.setItem('admin_auth', 'true');
          window.location.href = 'dashboard.html';
        } else {
          alertEl.innerHTML = '<div class="alert alert-error">⚠️ Incorrect password. Please try again.</div>';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch {
        alertEl.innerHTML = '<div class="alert alert-error">⚠️ Could not connect to server. Please try again.</div>';
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
